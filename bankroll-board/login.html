<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BANKROLL — Sign In</title>
  <meta name="description" content="Sign in to BANKROLL — the premium Web3 real estate board game."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #D4A853;
      --gold-light: #F0C96A;
      --dark: #0A0A0F;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #F0EDE6;
      --muted: rgba(240,237,230,0.5);
      --error: #FF5252;
      --success: #4CAF50;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--gold); top: -150px; right: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #1E88E5; bottom: -100px; left: -80px; animation-delay: 4s; }
    .orb-3 { width: 300px; height: 300px; background: #9C27B0; top: 40%; left: 40%; animation-delay: 8s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -30px) scale(1.05); }
    }

    /* Grid dots */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    /* Card */
    .auth-card {
      position: relative; z-index: 10;
      background: var(--card);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo { text-align: center; margin-bottom: 32px; }
    .logo__icon {
      font-size: 36px; margin-bottom: 10px;
      display: block;
      animation: spinIn 0.6s ease-out 0.2s both;
    }
    @keyframes spinIn {
      from { transform: rotate(-20deg) scale(0.5); opacity: 0; }
      to   { transform: rotate(0) scale(1); opacity: 1; }
    }
    .logo__title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }
    .logo__sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 6px;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Social button */
    .btn-social {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 200ms, border-color 200ms, transform 150ms;
      margin-bottom: 16px;
    }
    .btn-social:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.16); transform: translateY(-1px); }
    .btn-social:active { transform: translateY(0); }
    .btn-social svg { flex-shrink: 0; }

    /* Email form */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 200ms, background 200ms;
    }
    .field input:focus {
      border-color: var(--gold);
      background: rgba(212,168,83,0.06);
    }
    .field input::placeholder { color: rgba(240,237,230,0.25); }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 12px;
      color: #0A0A0F;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 200ms, transform 150ms, box-shadow 200ms;
      box-shadow: 0 4px 20px rgba(212,168,83,0.3);
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(212,168,83,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toggle */
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .toggle-link a {
      color: var(--gold-light);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .toggle-link a:hover { text-decoration: underline; }

    /* Status message */
    .status-msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
      display: none;
    }
    .status-msg--error { background: rgba(255,82,82,0.12); border: 1px solid rgba(255,82,82,0.3); color: #FF5252; }
    .status-msg--success { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.3); color: #4CAF50; }
    .status-msg.visible { display: block; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(10,10,15,0.3);
      border-top-color: #0A0A0F;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="auth-card">
    <div class="logo">
      <span class="logo__icon">🏦</span>
      <div class="logo__title">BANKROLL</div>
      <div class="logo__sub">Web3 Real Estate · Board Game</div>
    </div>

    <!-- Google Sign In -->
    <button class="btn-social" id="btn-google" onclick="signInGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">OR</div>

    <!-- Email Form -->
    <div id="form-signin">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field" id="password-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="field" id="confirm-field" style="display:none">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="btn-submit" onclick="handleEmailAuth()">Sign In</button>
    </div>

    <div class="toggle-link">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link" onclick="toggleMode()"> Create one</a>
    </div>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://kwcaksexrlgmuxredbcc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Y2Frc2V4cmxnbXV4cmVkYmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjA4MzgsImV4cCI6MjA5MjEzNjgzOH0.vsExdNZrc-R0eEINJQRvV5JG0I9BGRLqa51SEF-aELg'
    );

    let isSignUp = false;

    // Check if already logged in — redirect to lobby
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'lobby.html';
    });

    function showStatus(msg, type = 'error') {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = `status-msg status-msg--${type} visible`;
    }
    function hideStatus() {
      document.getElementById('status-msg').className = 'status-msg';
    }
    function setLoading(loading) {
      const btn = document.getElementById('btn-submit');
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span> Please wait...'
        : (isSignUp ? 'Create Account' : 'Sign In');
    }

    window.toggleMode = function() {
      isSignUp = !isSignUp;
      document.getElementById('confirm-field').style.display = isSignUp ? 'block' : 'none';
      document.getElementById('btn-submit').textContent = isSignUp ? 'Create Account' : 'Sign In';
      document.getElementById('toggle-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-link').textContent = isSignUp ? ' Sign in' : ' Create one';
      document.querySelector('[autocomplete="current-password"]').autocomplete = isSignUp ? 'new-password' : 'current-password';
      hideStatus();
    };

    window.signInGoogle = async function() {
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff"></span> Redirecting...';
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/bankroll-board/lobby.html' }
      });
      if (error) { showStatus(error.message); btn.disabled = false; btn.innerHTML = 'Continue with Google'; }
    };

    window.handleEmailAuth = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!email || !password) return showStatus('Please fill in all fields.');
      if (isSignUp && password !== confirm) return showStatus('Passwords do not match.');
      if (password.length < 8) return showStatus('Password must be at least 8 characters.');

      setLoading(true); hideStatus();
      try {
        if (isSignUp) {
          const { error } = await supabase.auth.signUp({
            email, password,
            options: { emailRedirectTo: window.location.origin + '/bankroll-board/lobby.html' }
          });
          if (error) throw error;
          showStatus('✅ Check your email for a confirmation link!', 'success');
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          window.location.href = 'lobby.html';
        }
      } catch (err) {
        showStatus(err.message);
      } finally {
        setLoading(false);
      }
    };

    // Enter key submits
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleEmailAuth();
    });
  </script>
</body>
</html>
