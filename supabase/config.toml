[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/login.html",
  "http://localhost:3000/lobby.html",
  "http://localhost:3000/index.html"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083

# Disable built-in HS256-only JWT verification for game_action.
# Our Edge Function handles auth itself via /auth/v1/user HTTP call,
# which supports both HS256 and ES256 (the project's algorithm).
[functions.game_action]
verify_jwt = false

[functions.create_wallet]
verify_jwt = false
